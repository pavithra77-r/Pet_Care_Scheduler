<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawCare - Pet Management System</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Georgia, serif;
    min-height: 100vh;
    background:
      radial-gradient(circle at top left, rgba(255, 214, 220, 0.55), transparent 25%),
      radial-gradient(circle at top right, rgba(181, 212, 244, 0.45), transparent 25%),
      linear-gradient(135deg, #fffaf6 0%, #f7f4ff 50%, #eefaf4 100%);
    overflow-x: hidden;
  }

  input, select, textarea {
    font-family: inherit;
    font-size: 14px;
    padding: 10px 12px;
    border: 1px solid rgba(180,180,180,0.45);
    border-radius: 12px;
    background: rgba(255,255,255,0.75);
    color: #111;
    width: 100%;
    outline: none;
    backdrop-filter: blur(8px);
    transition: all 0.2s ease;
  }

  input:focus, select:focus, textarea:focus {
    border-color: #7F77DD;
    box-shadow: 0 0 0 3px rgba(127,119,221,0.15);
    transform: translateY(-1px);
  }

  button {
    font-family: inherit;
    cursor: pointer;
  }

  .glass-card {
    background: rgba(255,255,255,0.62);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.45);
    box-shadow: 0 12px 30px rgba(83, 74, 183, 0.10);
  }

  .cute-title {
    background: linear-gradient(90deg, #534AB7, #D85A30, #0F6E56);
    background-clip: text;
    -webkit-background-clip: text;
  }

  .floating-pet {
    position: absolute;
    font-size: 34px;
    opacity: 0.9;
    animation: floaty 4s ease-in-out infinite;
    pointer-events: none;
  }

  .floating-pet.small {
    font-size: 24px;
    opacity: 0.75;
  }

  @keyframes floaty {
    0%,100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }

  .pet-banner {
    display: flex;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }

  .pet-bubble {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    box-shadow: 0 8px 18px rgba(0,0,0,0.08);
    border: 1px solid rgba(255,255,255,0.6);
  }

  .bubble-dog { background: linear-gradient(135deg, #FFF0D8, #FFE3B3); }
  .bubble-cat { background: linear-gradient(135deg, #FFE2EC, #FFD1E1); }
  .bubble-bird { background: linear-gradient(135deg, #DDF6FF, #C9EDFF); }
  .bubble-rabbit { background: linear-gradient(135deg, #F2E7FF, #E4D6FF); }
  .bubble-fish { background: linear-gradient(135deg, #DFFFF2, #CBF7E5); }

  .hero-strip {
    margin-top: 14px;
    margin-bottom: 18px;
    padding: 12px 16px;
    border-radius: 16px;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.45);
    box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    text-align: center;
    font-size: 14px;
    color: #5F5E5A;
  }

  .cute-pop {
    animation: popIn 0.28s ease;
  }

  @keyframes popIn {
    from { transform: scale(0.92); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .page-shell {
    min-height: 100vh;
    background:
      radial-gradient(circle at top left, rgba(255, 214, 220, 0.35), transparent 25%),
      radial-gradient(circle at top right, rgba(181, 212, 244, 0.30), transparent 25%),
      linear-gradient(135deg, #fffaf6 0%, #f7f4ff 50%, #eefaf4 100%);
  }

  .sidebar-layout {
    display: flex;
    min-height: 100vh;
  }

  .sidebar {
    width: 250px;
    padding: 20px 16px;
    background: rgba(255,255,255,0.62);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-right: 1px solid rgba(255,255,255,0.5);
    box-shadow: 8px 0 20px rgba(0,0,0,0.04);
    position: sticky;
    top: 0;
    height: 100vh;
  }

  .sidebar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 22px;
    font-size: 20px;
    font-weight: 700;
  }

  .sidebar-menu {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .sidebar-btn {
    width: 100%;
    text-align: left;
    padding: 12px 14px;
    border: none;
    border-radius: 14px;
    background: transparent;
    color: #333;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .sidebar-btn:hover {
    background: rgba(83, 74, 183, 0.08);
  }

  .sidebar-btn.active {
    background: linear-gradient(135deg, rgba(83,74,183,0.14), rgba(175,169,236,0.18));
    color: #534AB7;
    font-weight: 600;
  }

  .main-content {
    flex: 1;
    min-width: 0;
  }

  .profile-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 14px;
    background: rgba(255,255,255,0.55);
    border: 1px solid rgba(255,255,255,0.45);
    cursor: pointer;
  }

  .profile-panel {
    position: fixed;
    top: 80px;
    right: 24px;
    width: 330px;
    z-index: 999;
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.5);
    border-radius: 20px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.12);
    padding: 18px;
  }

  .profile-section {
    padding: 10px 0;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }

  .profile-section:last-child {
    border-bottom: none;
  }

  .profile-label {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }

  .profile-value {
    font-size: 14px;
    color: #222;
    font-weight: 500;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }

  .stat-card {
    padding: 16px;
    border-radius: 18px;
    color: #222;
    min-height: 110px;
    box-shadow: 0 10px 22px rgba(0,0,0,0.05);
    border: 1px solid rgba(255,255,255,0.55);
  }

  .stat-icon {
    font-size: 24px;
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 13px;
    color: #555;
  }

  .section-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 16px;
    margin-top: 18px;
  }

  .mini-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .mini-item {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 14px;
    background: rgba(255,255,255,0.55);
    border: 1px solid rgba(255,255,255,0.45);
  }

  .filter-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .chip-btn {
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid rgba(120,120,120,0.18);
    background: rgba(255,255,255,0.75);
    font-size: 13px;
  }

  .chip-btn.active {
    background: #534AB7;
    color: white;
    border-color: #534AB7;
  }

  .card-grid-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .muted {
    color: #666;
    font-size: 13px;
  }

  .tag-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .tiny-tag {
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 999px;
    background: rgba(83,74,183,0.10);
    color: #534AB7;
  }

  .toast-wrap {
    position: fixed;
    top: 18px;
    right: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 2000;
  }

  .toast {
    min-width: 270px;
    max-width: 340px;
    padding: 14px 16px;
    border-radius: 18px;
    color: #222;
    border: 1px solid rgba(255,255,255,0.65);
    box-shadow: 0 14px 30px rgba(0,0,0,0.12);
    backdrop-filter: blur(12px);
    animation: slideIn 0.3s ease;
  }

  .toast.success {
    background: linear-gradient(135deg, rgba(225,245,238,0.95), rgba(221,246,255,0.93));
  }

  .toast.info {
    background: linear-gradient(135deg, rgba(238,237,254,0.96), rgba(244,224,255,0.93));
  }

  .toast.warning {
    background: linear-gradient(135deg, rgba(255,240,216,0.95), rgba(255,224,235,0.92));
  }

  @keyframes slideIn {
    from { transform: translateX(30px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1500;
    padding: 20px;
  }

  .modal-card {
    width: 100%;
    max-width: 520px;
    border-radius: 22px;
    padding: 20px;
  }

  .star-row {
    display: flex;
    gap: 8px;
    margin: 12px 0;
  }

  .star-btn {
    font-size: 24px;
    background: transparent;
    border: none;
  }

  @media (max-width: 1100px) {
    .stats-grid {
      grid-template-columns: repeat(2, 1fr);
    }

    .card-grid-3 {
      grid-template-columns: repeat(2, 1fr);
    }

    .section-grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 900px) {
    .sidebar {
      width: 94px;
      padding: 18px 10px;
    }

    .sidebar-brand span:last-child {
      display: none;
    }

    .sidebar-btn {
      font-size: 12px;
      padding: 10px;
    }

    .card-grid-3,
    .stats-grid {
      grid-template-columns: 1fr;
    }
  }
  .grooming-section p,
.grooming-section span,
.grooming-section li {
  color: #222 !important;
}
</style>
</head>
<body>
{% raw %}
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useEffect } = React;

async function api(url, options = {}) {
  const response = await fetch(url, {
    headers: { "Content-Type": "application/json" },
    ...options
  });

  const data = await response.json();

  if (!response.ok) {
    throw new Error(data.error || "Something went wrong");
  }

  return data;
}

async function loadData() {
  return await api("/api/dashboard-data");
}

  }

function Avatar({ name, size=40, bg='#EEEDFE', color='#534AB7' }) {
  const initials = name ? name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) : '?';
  return (
    <div style={{
      width:size,height:size,borderRadius:'50%',background:bg,color,
      display:'flex',alignItems:'center',justifyContent:'center',
      fontWeight:500,fontSize:size*0.36,flexShrink:0,
      boxShadow:'0 6px 14px rgba(0,0,0,0.08)'
    }}>
      {initials}
    </div>
  );
}

function Badge({ children, color='#534AB7', bg='#EEEDFE' }) {
  return (
    <span style={{
      background:bg,color,fontSize:11,padding:'3px 8px',
      borderRadius:20,fontWeight:500
    }}>
      {children}
    </span>
  );
}

function Card({ children, style={} }) {
  return (
    <div className="glass-card cute-pop" style={{ borderRadius: 18, padding: '1rem 1.25rem', ...style }}>
      {children}
    </div>
  );
}

function Input({ label, ...props }) {
  return (
    <div style={{marginBottom:14}}>
      {label && <label style={{fontSize:12,color:'#666',display:'block',marginBottom:5,fontWeight:500}}>{label}</label>}
      <input {...props}/>
    </div>
  );
}

function Select({ label, options, ...props }) {
  return (
    <div style={{marginBottom:14}}>
      {label && <label style={{fontSize:12,color:'#666',display:'block',marginBottom:5,fontWeight:500}}>{label}</label>}
      <select
        {...props}
        style={{
          fontFamily:'inherit',
          fontSize:14,
          padding:'10px 12px',
          border:'1px solid rgba(180,180,180,0.45)',
          borderRadius:12,
          background:'rgba(255,255,255,0.75)',
          color:'#111',
          width:'100%',
          outline:'none'
        }}
      >
        {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
      </select>
    </div>
  );
}

function Btn({ children, onClick, variant='primary', style={}, disabled=false }) {
  const base = {
    padding:'10px 20px',
    borderRadius:12,
    fontSize:14,
    fontWeight:500,
    border:'none',
    cursor:disabled?'not-allowed':'pointer',
    transition:'all 0.15s',
    opacity:disabled?0.5:1,
    boxShadow:'0 8px 16px rgba(0,0,0,0.06)',
    ...style
  };

  const variants = {
    primary:{background:'#534AB7',color:'#fff'},
    secondary:{background:'rgba(255,255,255,0.8)',color:'#111',border:'0.5px solid #ccc'},
    ghost:{background:'transparent',color:'#534AB7',border:'0.5px solid #AFA9EC'}
  };

  return <button onClick={onClick} disabled={disabled} style={{...base,...variants[variant]}}>{children}</button>;
}

function Toasts({ items }) {
  return (
    <div className="toast-wrap">
      {items.map(t => (
        <div key={t.id} className={`toast ${t.type || 'info'}`}>
          <div style={{ fontWeight: 700, marginBottom: 4 }}>{t.title}</div>
          <div style={{ fontSize: 13, color: '#555' }}>{t.message}</div>
        </div>
      ))}
    </div>
  );
}

function Sidebar({ user, active, onNavigate, onProfileClick, onSignOut }) {
  const items = user?.role === 'doctor'
    ? [
        { key: 'dashboard', label: '🏠 Dashboard' },
        { key: 'patients', label: '🩺 Patients' },
        { key: 'appointments', label: '📅 Appointments' },
        { key: 'places', label: '📍 Places' },
        { key: 'profile', label: '👤 Profile' }
      ]
    : [
        { key: 'dashboard', label: '🏠 Dashboard' },
        { key: 'pets', label: '🐾 My Pets' },
        { key: 'appointments', label: '📅 Appointments' },
        { key: 'articles', label: '📚 Articles' },
        { key: 'places', label: '📍 Places' },
        { key: 'grooming', label: '✂️ Grooming' },
        { key: 'community', label: '🐾 Community' },
        { key: 'competition', label: '🏆 Competitions' },
        { key: 'profile', label: '👤 Profile' },
        { key: 'music', label: '🎵 Music' }
      ];

  return (
    <div className="sidebar">
      <div className="sidebar-brand">
        <span>🐾</span>
        <span className="cute-title">PawCare</span>
      </div>

      <div style={{ marginBottom: 18 }}>
        <Card style={{ padding: '12px', borderRadius: 16 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <Avatar name={user.name} size={42} />
            <div>
              <div style={{ fontWeight: 600, fontSize: 14 }}>{user.name}</div>
              <div style={{ fontSize: 12, color: '#666' }}>
                {user.role === 'doctor' ? 'Veterinarian 🩺' : 'Pet Owner 🐶'}
              </div>
            </div>
          </div>
        </Card>
      </div>

      <div className="sidebar-menu">
        {items.map(item => (
          <button
            key={item.key}
            className={`sidebar-btn ${active === item.key ? 'active' : ''}`}
            onClick={() => item.key === 'profile' ? onProfileClick() : onNavigate(item.key)}
          >
            {item.label}
          </button>
        ))}

        <button className="sidebar-btn" onClick={onSignOut}>
          🚪 Sign Out
        </button>
      </div>
    </div>
  );
}

function ProfilePanel({ user, petCount = 0, visitCount = 0, appointmentCount = 0, onClose, onSignOut, avgRating }) {
  return (
    <div className="profile-panel">
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
        <h3 className="cute-title" style={{ fontSize: 20, fontWeight: 700 }}>👤 Profile</h3>
        <button onClick={onClose} style={{ background: 'none', border: 'none', fontSize: 18, cursor: 'pointer', color: '#777' }}>
          ✕
        </button>
      </div>

      <div className="profile-section">
        <div className="profile-label">Name</div>
        <div className="profile-value">{user.name}</div>
      </div>

      <div className="profile-section">
        <div className="profile-label">Email</div>
        <div className="profile-value">{user.email}</div>
      </div>

      <div className="profile-section">
        <div className="profile-label">Role</div>
        <div className="profile-value">{user.role === 'doctor' ? 'Veterinarian 🩺' : 'Pet Owner 🐾'}</div>
      </div>

      <div className="profile-section">
        <div className="profile-label">Quick Stats</div>
        <div className="profile-value">
          {user.role === 'doctor'
            ? `${visitCount} visit logs • ${appointmentCount} appointments`
            : `${petCount} pets • ${appointmentCount} appointments`}
        </div>
      </div>

      {user.role === 'doctor' && (
        <div className="profile-section">
          <div className="profile-label">Average Rating</div>
          <div className="profile-value">{avgRating ? `${avgRating.toFixed(1)} ⭐` : 'No ratings yet'}</div>
        </div>
      )}

      <div className="profile-section">
        <div className="profile-label">Settings</div>
        <div className="profile-value">Notifications, privacy, support</div>
      </div>

      <div style={{ marginTop: 16 }}>
        <Btn onClick={onSignOut} style={{ width: '100%' }}>
          🚪 Sign Out
        </Btn>
      </div>
    </div>
  );
}

function RatingModal({ pet, ownerId, doctors, onClose, onSubmit }) {
  const assignedVet = doctors.find(d => String(d.id) === String(pet.vetId));
  const [rating, setRating] = useState(5);
  const [comment, setComment] = useState('');

  return (
    <div className="modal-backdrop">
      <Card className="modal-card" style={{ maxWidth: 520 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: 12 }}>
          <h3 className="cute-title" style={{ fontSize: 20, fontWeight: 700 }}>⭐ Rate Your Vet</h3>
          <button onClick={onClose} style={{ background:'none', border:'none', fontSize:18 }}>✕</button>
        </div>

        <p className="muted" style={{ marginBottom: 10 }}>
          Pet: <strong>{pet.name}</strong> {assignedVet ? `• Vet: ${assignedVet.name}` : ''}
        </p>

        <div className="star-row">
          {[1,2,3,4,5].map(star => (
            <button
              key={star}
              className="star-btn"
              onClick={() => setRating(star)}
            >
              {star <= rating ? '⭐' : '☆'}
            </button>
          ))}
        </div>

        <div style={{ marginBottom: 16 }}>
          <label style={{fontSize:12,color:'#666',display:'block',marginBottom:5,fontWeight:500}}>Comment</label>
          <textarea
            rows={4}
            placeholder="Share your experience..."
            value={comment}
            onChange={e => setComment(e.target.value)}
          />
        </div>

        <div style={{ display:'flex', gap:10, justifyContent:'flex-end' }}>
          <Btn variant="secondary" onClick={onClose}>Cancel</Btn>

function AppointmentModal({ pets, doctors, ownerId, onClose, onSubmit }) {

    time: '',
    notes: ''
  });

  const selectedPet = assignedPets.find(p => String(p.id) === form.petId);
  const selectedVet = doctors.find(d => String(d.id) === String(selectedPet?.vetId));

  function setField(k, v) {

  return (
    <div className="modal-backdrop">
      <Card className="modal-card" style={{ maxWidth: 560 }}>

              <Btn onClick={onClose}>Close</Btn>
            </div>
          </>

              value={form.petId}

            />

            <Input label="Date" type="date" value={form.date} onChange={e => setField('date', e.target.value)} />
            <Input label="Time" type="time" value={form.time} onChange={e => setField('time', e.target.value)} />

          setCityFilter('Bengaluru');

        // Mysuru nearby

          )}

          {tab==='register'&&<Input label="Full name *" placeholder="Jane Smith" value={form.name} onChange={e=>set('name',e.target.value)}/>}

          {tab==='register'&&role==='doctor'&&<Input label="Specialization" placeholder="e.g. Small Animals" value={form.specialization} onChange={e=>set('specialization',e.target.value)}/>}
          {tab === 'register' && (

    label="Phone Number *"

          {error&&<p style={{color:'#D85A30',fontSize:13,marginBottom:12}}>{error}</p>}

          <Btn onClick={tab==='login'?handleLogin:handleRegister} style={{width:'100%'}}>

        </Card>

  });

  const assignedPatients = useMemo(() => allPets.filter(p => String(p.vetId) === String(user.id)), [allPets, user]);
  const myVisits = useMemo(() => {
    if (user.role === 'doctor') {
      const ids = assignedPatients.map(p => p.id);
      return allVisits.filter(v => ids.includes(v.petId));
    }
    const ids = myPets.map(p => p.id);
    return allVisits.filter(v => ids.includes(v.petId));
  }, [allVisits, myPets, assignedPatients, user]);

  const myAppointments = useMemo(() => {
    if (user.role === 'doctor') {
      return allAppointments.filter(a => String(a.vetId) === String(user.id));

      const typeOk = petTypeFilter === 'All' || p.type === petTypeFilter;
      return searchOk && typeOk;

    try {
      if (!petForm.name || !petForm.breed || !petForm.age) {
        return setPetError('Name, breed and age are required');
      }

      await api("/api/pets", {
        method: "POST",
        body: JSON.stringify({
          ownerId: user.id,
          vetId: petForm.vetId || null,
          name: petForm.name,
          type: petForm.type,
          breed: petForm.breed,
          age: petForm.age,
          feedingSchedule: petForm.feedingSchedule,
          medicineReminder: petForm.medicineReminder

        name:'',type:'Dog',breed:'',age:'',feedingSchedule:'',medicineReminder:'',vetId:''

      refreshData();

                            <div style={{flex:1}}>
                              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                                <span style={{fontWeight:600,fontSize:16}}>{pet.name}</span>
                                <Badge bg={bg} color={fg}>{pet.type}</Badge>
                              </div>
                              <p className="muted">{pet.breed} • {pet.age} years</p>
                              <div style={{display:'flex',gap:16,fontSize:12,flexWrap:'wrap', marginTop: 8}}>
                                {pet.feedingSchedule&&<span style={{color:'#666'}}>🍽 {pet.feedingSchedule}</span>}
                                {pet.medicineReminder&&<span style={{color:'#666'}}>💊 {pet.medicineReminder}</span>}
                                {vet&&<span style={{color:'#666'}}>🩺 {vet.name}</span>}
                              </div>
                              {visits.length>0&&<p style={{fontSize:12,color:'#0F6E56',marginTop:6}}>✓ {visits.length} vet visit{visits.length!==1?'s':''} logged</p>}
                            </div>
                          </div>

                          <div style={{display:'flex',gap:8, flexWrap:'wrap', justifyContent:'flex-end'}}>
                            <Btn variant="secondary" onClick={() => setShowAppointmentModal(true)} style={{padding:'6px 10px',fontSize:12}}>📅 Book</Btn>
                            {pet.vetId && <Btn variant="ghost" onClick={() => setRatingPet(pet)} style={{padding:'6px 10px',fontSize:12}}>⭐ Rate Vet</Btn>}
                            <Btn variant="secondary" onClick={()=>deletePet(pet.id)} style={{padding:'6px 10px',fontSize:12}}>✕</Btn>
                          </div>
                        </div>
                      </Card>
                    );
                  })}
                </div>
              )}
            </>
          )}
        </div>

        {showProfile && (
          <ProfilePanel
            user={user}
            petCount={myPets.length}
            visitCount={myVisits.length}
            appointmentCount={myAppointments.length}
            avgRating={avgDoctorRating}
            onClose={() => setShowProfile(false)}
            onSignOut={onLogout}
          />
        )}

        {showAppointmentModal && user.role !== 'doctor' && (
          <AppointmentModal
            pets={myPets}
            doctors={doctors}
            ownerId={user.id}
            onClose={() => setShowAppointmentModal(false)}
            onSubmit={bookAppointment}
          />
        )}

        {ratingPet && (
          <RatingModal
            pet={ratingPet}
            ownerId={user.id}
            doctors={doctors}
            onClose={() => setRatingPet(null)}
            onSubmit={submitRating}
          />
        )}
      </div>
    </div>
  );
}

function App() {
  const [data, setData] = useState({
    users: [],
    pets: [],
    vetVisits: [],
    appointments: [],
    ratings: [],
    doctors: []
  });
  const [user, setUser] = useState(null);
  const [toasts, setToasts] = useState([]);
  
  const [email, setEmail] = useState("");

  const validatePhone = (phone) => {
    const regex = /^\+91\d{10}$/;
    return regex.test(phone);
  };

  async function refreshData() {
    try {
      const fresh = await loadData();
      setData(fresh);
    } catch (err) {
      console.error(err);
    }
  }

  useEffect(() => {
    refreshData();
  }, []);

  function notify(title, message, type='info') {
    const id = Date.now() + Math.random();
    setToasts(prev => [...prev, { id, title, message, type }]);
    setTimeout(() => {
      setToasts(prev => prev.filter(t => t.id !== id));
    }, 3200);
  }

  function handleLogout() {
    setUser(null);
    notify('Signed out', 'You have been logged out successfully.', 'info');
  }

  return (
    <>
      <Toasts items={toasts} />
      {!user ? (
        <AuthScreen
          onLogin={setUser}
          notify={notify}
        />
      ) : (
        <MainApp
          user={user}
          data={data}
          refreshData={refreshData}
          onLogout={handleLogout}
          notify={notify}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
